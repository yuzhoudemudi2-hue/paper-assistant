version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    formatter: standard
    level: INFO
    filename: logs/application.log
    encoding: utf-8
loggers:
  paper_assistant:
    handlers:
      - console
      - file
    level: INFO
    propagate: false
root:
  handlers:
    - console
  level: WARNING
